# .sentix/providers/openai.toml — OpenAI API 어댑터
#
# OpenAI 모델을 에이전트로 사용할 때 설정.
# 실험적 지원 — Claude 대비 파이프라인 호환성 제한될 수 있음.

[provider]
name = "openai"
type = "api"

[api]
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"  # 환경변수명
model = "gpt-4o"                # 모델명
# max_tokens = 16384

[limits]
max_parallel_agents = 4
timeout_seconds = 600
max_retries = 3

[compatibility]
# OpenAI 모델의 tool use 방식이 다르므로 일부 에이전트 동작이 다를 수 있음
notes = "pr-review, security 에이전트에서 코드 분석 정확도가 Claude 대비 낮을 수 있음"

[safety]
# 안전어(Safety Word) 시스템 — 모든 LLM provider에 동일 적용
# .sentix/safety.toml에 SHA-256 해시 저장 (평문 저장 안 함, PEM 키 수준 보안)
# 위험 요청 감지 시 안전어 검증 후에만 실행 허용
enforce = true
system_prompt_inject = true     # API 호출 시 안전어 지침을 system prompt에 자동 주입
