name: self-evolve
# sentix가 1시간마다 자기 자신을 분석하고 개선하는 워크플로우
# 이슈 발견 시 자동으로 PR을 생성한다.
#
# 공급망 보안: 모든 Action은 커밋 SHA 고정

on:
  schedule:
    - cron: '0 * * * *'   # 매시 정각
  workflow_dispatch:        # 수동 실행

concurrency:
  group: self-evolve
  cancel-in-progress: true

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Run tests
        id: tests
        run: |
          npm test 2>&1 | tee /tmp/test-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run evolve analysis
        id: evolve
        run: |
          node bin/sentix.js evolve > /tmp/evolve-output.txt 2>&1 || true
          cat /tmp/evolve-output.txt

          # 이슈 수 추출 (grep 실패해도 0 반환)
          ISSUES=$(grep -c "^    -" /tmp/evolve-output.txt || true)
          CRITICAL=$(grep -c "Critical:" /tmp/evolve-output.txt || true)
          echo "issues=${ISSUES:-0}" >> $GITHUB_OUTPUT
          echo "critical=${CRITICAL:-0}" >> $GITHUB_OUTPUT

      - name: Check for actionable issues
        id: check
        env:
          ISSUES: ${{ steps.evolve.outputs.issues }}
          CRITICAL: ${{ steps.evolve.outputs.critical }}
        run: |
          if [ "$ISSUES" = "0" ] || [ "$ISSUES" = "" ]; then
            echo "No issues found — sentix is healthy"
            echo "needs_action=false" >> $GITHUB_OUTPUT
          else
            echo "Found $ISSUES issue(s), $CRITICAL critical"
            echo "needs_action=true" >> $GITHUB_OUTPUT
          fi

      - name: Create improvement branch and PR
        if: steps.check.outputs.needs_action == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="sentix/self-evolve-$(date +%Y%m%d-%H%M)"
          EVOLVE_OUTPUT=$(cat /tmp/evolve-output.txt)
          TEST_OUTPUT=$(tail -20 /tmp/test-output.txt)

          # 브랜치 생성
          git checkout -b "$BRANCH"

          # evolve 결과를 티켓으로 저장
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > tasks/tickets/evolve-$(date +%Y%m%d%H%M).md << TICKET
          # Self-Evolution Report — $TIMESTAMP

          ## Analysis Output
          \`\`\`
          $EVOLVE_OUTPUT
          \`\`\`

          ## Test Output
          \`\`\`
          $TEST_OUTPUT
          \`\`\`

          ## Status: open
          ## Type: self-evolve
          ## Generated: $TIMESTAMP
          TICKET

          # 커밋 + 푸시
          git config user.name "sentix-evolve"
          git config user.email "evolve@noreply"
          git add tasks/tickets/
          git diff --staged --quiet && exit 0

          git commit -m "chore: self-evolution report $(date +%Y-%m-%d-%H%M)"
          git push origin "$BRANCH" || exit 0

          # PR 생성
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "$(jq -n \
              --arg title "evolve: self-improvement $(date +%Y-%m-%d %H:%M)" \
              --arg body "## Self-Evolution Report

          \`sentix evolve\` 분석 결과 개선이 필요한 항목이 발견되었습니다.

          ### 분석 결과
          \`\`\`
          $(echo "$EVOLVE_OUTPUT" | tail -20)
          \`\`\`

          ### 테스트 상태
          \`\`\`
          $(echo "$TEST_OUTPUT" | tail -5)
          \`\`\`

          > 이 PR은 \`self-evolve.yml\` 워크플로우에 의해 자동 생성되었습니다.
          > 리뷰 후 머지하거나, \`sentix run\`으로 자동 수정할 수 있습니다." \
              --arg head "$BRANCH" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')"
