name: publish
# main 머지 시 자동: 버전 범프 → CHANGELOG → npm 배포
# 필요 Secret: NPM_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Auto version bump + CHANGELOG
        id: version
        run: |
          node -e "
          const { execSync } = require('child_process');
          const fs = require('fs');

          // 마지막 릴리즈 이후 커밋 수집
          let range = 'HEAD~30..HEAD';
          try {
            const lastTag = execSync('git describe --tags --abbrev=0 2>/dev/null', { encoding: 'utf-8' }).trim();
            if (lastTag) range = lastTag + '..HEAD';
          } catch {}

          const commits = execSync('git log ' + range + ' --pretty=format:\"%s\"', { encoding: 'utf-8' })
            .trim().split('\n').filter(Boolean);

          // bump type 감지
          let type = 'patch';
          for (const c of commits) {
            if (c.includes('BREAKING CHANGE') || /^[a-z]+!:/.test(c)) { type = 'major'; break; }
            if (/^feat(\(.+?\))?:/.test(c)) type = 'minor';
          }

          // 버전 계산
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = pkg.version.split('.').map(Number);
          let nv;
          if (type === 'major') nv = (major+1)+'.0.0';
          else if (type === 'minor') nv = major+'.'+(minor+1)+'.0';
          else nv = major+'.'+minor+'.'+(patch+1);

          // npm 버전 확인
          let npmVer = '0.0.0';
          try { npmVer = execSync('npm view sentix version 2>/dev/null', { encoding: 'utf-8' }).trim(); } catch {}
          if (nv === npmVer) { console.log('Version ' + nv + ' already published'); process.exit(0); }

          // package.json 업데이트
          pkg.version = nv;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          // INTERFACE.md 업데이트
          if (fs.existsSync('INTERFACE.md')) {
            let iface = fs.readFileSync('INTERFACE.md', 'utf8');
            iface = iface.replace(/version: .+/, 'version: ' + nv);
            fs.writeFileSync('INTERFACE.md', iface);
          }

          // CHANGELOG 생성
          const date = new Date().toISOString().slice(0, 10);
          const cats = { feat: [], fix: [], ci: [], docs: [], other: [] };
          for (const c of commits) {
            if (/^chore: (release|bump)/.test(c) || c.startsWith('Merge pull')) continue;
            const clean = c.replace(/^\"|\"$/g, '');
            if (/^feat(\(.+?\))?:/.test(clean)) cats.feat.push(clean.replace(/^feat(\(.+?\))?:\s*/, ''));
            else if (/^fix(\(.+?\))?:/.test(clean)) cats.fix.push(clean.replace(/^fix(\(.+?\))?:\s*/, ''));
            else if (/^ci(\(.+?\))?:/.test(clean)) cats.ci.push(clean.replace(/^ci(\(.+?\))?:\s*/, ''));
            else if (/^docs(\(.+?\))?:/.test(clean)) cats.docs.push(clean.replace(/^docs(\(.+?\))?:\s*/, ''));
            else if (clean.trim()) cats.other.push(clean.replace(/^[a-z]+(\(.+?\))?:\s*/, ''));
          }

          let entry = '## [' + nv + '] - ' + date + '\n';
          if (cats.feat.length) entry += '\n### New Features\n\n' + cats.feat.map(x => '- ' + x).join('\n') + '\n';
          if (cats.fix.length) entry += '\n### Bug Fixes\n\n' + cats.fix.map(x => '- ' + x).join('\n') + '\n';
          if (cats.ci.length) entry += '\n### CI/CD\n\n' + cats.ci.map(x => '- ' + x).join('\n') + '\n';
          if (cats.docs.length) entry += '\n### Documentation\n\n' + cats.docs.map(x => '- ' + x).join('\n') + '\n';
          if (cats.other.length) entry += '\n### Improvements\n\n' + cats.other.map(x => '- ' + x).join('\n') + '\n';

          if (fs.existsSync('CHANGELOG.md')) {
            let cl = fs.readFileSync('CHANGELOG.md', 'utf8');
            cl = cl.replace('# Changelog', '# Changelog\n\n' + entry + '\n---');
            fs.writeFileSync('CHANGELOG.md', cl);
          } else {
            fs.writeFileSync('CHANGELOG.md', '# Changelog\n\n' + entry + '\n---\n');
          }

          // output
          const output = 'new=' + nv + '\ncurrent=' + pkg.version + '\ntype=' + type;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, output + '\n');
          console.log(pkg.version + ' -> ' + nv + ' (' + type + ')');
          "

      - name: Run tests
        if: steps.version.outputs.new
        run: npm test

      - name: Commit + tag + push
        if: steps.version.outputs.new
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md INTERFACE.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag -a "v${{ steps.version.outputs.new }}" -m "Release v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      - name: Publish to npm
        if: steps.version.outputs.new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
