name: publish
# main 머지 시 자동: 버전 범프 → CHANGELOG → npm 배포
# 필요 Secret: NPM_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags origin

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Auto version bump + CHANGELOG
        id: version
        run: |
          node -e "
          const { execSync } = require('child_process');
          const fs = require('fs');

          function run(cmd) {
            try { return execSync(cmd, { encoding: 'utf-8', stdio: ['pipe','pipe','pipe'] }).trim(); }
            catch { return ''; }
          }

          // 커밋 수집 — 여러 방법 시도
          let commits = [];
          const lastTag = run('git describe --tags --abbrev=0');
          if (lastTag) {
            const log = run('git log ' + lastTag + '..HEAD --pretty=format:%s');
            if (log) commits = log.split('\n');
          }
          if (!commits.length) {
            const log = run('git log --pretty=format:%s -30');
            if (log) commits = log.split('\n');
          }
          commits = commits.filter(Boolean);
          console.log('Commits (' + commits.length + '):', commits.slice(0, 10).join(', '));

          // bump type 감지
          let type = 'patch';
          for (const c of commits) {
            if (c.includes('BREAKING CHANGE') || /^[a-z]+!:/.test(c)) { type = 'major'; break; }
            if (/^feat(\(.+?\))?:/.test(c)) type = 'minor';
          }

          // 버전 계산
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const old = pkg.version;
          const [major, minor, patch] = old.split('.').map(Number);
          let nv;
          if (type === 'major') nv = (major+1)+'.0.0';
          else if (type === 'minor') nv = major+'.'+(minor+1)+'.0';
          else nv = major+'.'+minor+'.'+(patch+1);

          // npm 중복 확인
          const npmVer = run('npm view sentix version') || '0.0.0';
          if (nv === npmVer) { console.log(nv + ' already on npm — skip'); process.exit(0); }

          // package.json
          pkg.version = nv;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          // INTERFACE.md
          if (fs.existsSync('INTERFACE.md')) {
            let f = fs.readFileSync('INTERFACE.md', 'utf8');
            fs.writeFileSync('INTERFACE.md', f.replace(/version: .+/, 'version: ' + nv));
          }

          // CHANGELOG
          const date = new Date().toISOString().slice(0, 10);
          const cats = { feat: [], fix: [], ci: [], docs: [], other: [] };
          for (const c of commits) {
            if (/^chore: (release|bump)/.test(c) || c.startsWith('Merge pull')) continue;
            if (/^feat(\(.+?\))?:/.test(c)) cats.feat.push(c.replace(/^feat(\(.+?\))?:\s*/, ''));
            else if (/^fix(\(.+?\))?:/.test(c)) cats.fix.push(c.replace(/^fix(\(.+?\))?:\s*/, ''));
            else if (/^ci(\(.+?\))?:/.test(c)) cats.ci.push(c.replace(/^ci(\(.+?\))?:\s*/, ''));
            else if (/^docs(\(.+?\))?:/.test(c)) cats.docs.push(c.replace(/^docs(\(.+?\))?:\s*/, ''));
            else if (c.trim()) cats.other.push(c.replace(/^[a-z]+(\(.+?\))?:\s*/, ''));
          }
          let entry = '## [' + nv + '] - ' + date + '\n';
          const labels = { feat: 'New Features', fix: 'Bug Fixes', ci: 'CI/CD', docs: 'Documentation', other: 'Improvements' };
          for (const [k, items] of Object.entries(cats)) {
            if (items.length) entry += '\n### ' + labels[k] + '\n\n' + [...new Set(items)].map(x => '- ' + x).join('\n') + '\n';
          }
          if (fs.existsSync('CHANGELOG.md')) {
            let cl = fs.readFileSync('CHANGELOG.md', 'utf8');
            fs.writeFileSync('CHANGELOG.md', cl.replace('# Changelog', '# Changelog\n\n' + entry + '\n---'));
          } else {
            fs.writeFileSync('CHANGELOG.md', '# Changelog\n\n' + entry + '\n---\n');
          }

          // output
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'new=' + nv + '\nold=' + old + '\ntype=' + type + '\n');
          console.log(old + ' -> ' + nv + ' (' + type + ')');
          "

      - name: Run tests
        if: steps.version.outputs.new
        run: npm test

      - name: Commit + tag + push
        if: steps.version.outputs.new
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md INTERFACE.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag -a "v${{ steps.version.outputs.new }}" -m "Release v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      - name: Publish to npm
        if: steps.version.outputs.new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
